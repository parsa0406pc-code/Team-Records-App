services:
  - type: web
    name: team-records-app
    env: python

    buildCommand: pip install -r requirements.txt

    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: SECRET_KEY
        generateValue: true

      - key: DATABASE_URL
        fromDatabase:
          name: team-records-db
          property: connectionString

databases:
  - name: team-records-db
