<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        Team Records App
    </title>

    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

    <header class="topbar">

        <a class="brand" href="/">
            Team Records
        </a>

        <nav class="nav">

            {% if user %}

            <span class="user-name">
                {{ user.name | title }}
            </span>

            <form method="post" action="/logout">
                <button class="nav-button">
                    Logout
                </button>
            </form>

            {% else %}

            <a href="/login">
                Anmelden
            </a>

            <a href="/register">
                Registrieren
            </a>

            {% endif %}

        </nav>

    </header>

    <main class="page">

        {% block content %}
        {% endblock %}

    </main>

</body>

</html>
