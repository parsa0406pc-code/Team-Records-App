{% extends "base.html" %}

{% block content %}

<div class="auth-box">

    <h1>
        Passwort vergessen
    </h1>

    {% if error %}
    <div class="error">
        {{ error }}
    </div>
    {% endif %}

    {% if success %}
    <div class="success">
        {{ success }}
    </div>
    {% endif %}

    <form method="post" action="/forgot-password">

        <label>
            E-Mail
        </label>

        <input type="email" name="email" required>

        <button class="btn full">
            Link senden
        </button>

    </form>

</div>

{% endblock %}
