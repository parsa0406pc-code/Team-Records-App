{% extends "base.html" %}

{% block content %}

<div class="auth-box">

    <h1>
        Registrieren
    </h1>

    {% if error %}
    <div class="error">
        {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/register">

        <label>
            Name
        </label>

        <input name="name" required>

        <label>
            E-Mail
        </label>

        <input type="email" name="email" required>

        <label>
            Passwort
        </label>

        <input type="password" name="password" required>

        <button class="btn full">
            Konto erstellen
        </button>

    </form>

</div>

{% endblock %}
